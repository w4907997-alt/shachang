<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>沙场记账</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1976D2">
</head>
<body>

<!-- ========== 首页 ========== -->
<div id="page-home" class="page active">
  <div class="page-header page-header-home">
    <h1>沙场记账</h1>
    <div class="header-icon" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    </div>
  </div>
  <div class="page-body page-body-home">
    <div class="stats-area">
      <div class="stat-card">
        <div class="stat-row">
          <div class="stat-label">今日金额</div>
          <span class="stat-badge" id="home-today-badge">今日 0 笔</span>
        </div>
        <div class="stat-value" id="home-today-amount">¥0.00</div>
        <div class="stat-separator"></div>
        <div class="stat-label" style="margin-bottom:6px;">未结清欠款</div>
        <div class="stat-value warning" id="home-total-debt">¥0.00</div>
      </div>
    </div>
    <div class="section-header">
      <span class="section-title">近期订单</span>
    </div>
    <div id="home-recent-orders"><div class="empty-tip">暂无订单记录</div></div>
  </div>
</div>

<!-- ========== 记账助手 ========== -->
<div id="page-chat" class="page">
  <div class="page-header">
    <h1>记账助手</h1>
    <div style="display:flex;gap:8px;align-items:center;position:relative;z-index:1;">
      <div class="header-icon" id="chat-search-btn" onclick="toggleChatSearch()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="header-icon" id="chat-menu-btn">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      </div>
    </div>
  </div>
  <!-- 搜索面板（默认隐藏） -->
  <div id="chat-search-panel" class="chat-search-panel" style="display:none;">
    <input type="text" id="chat-search-input" class="chat-search-input" placeholder="搜索客户、商品、关键词…" oninput="searchChatMessages()">
    <button class="btn-small" onclick="closeChatSearch()">取消</button>
  </div>
  <div id="chat-messages" class="chat-area">
    <div class="chat-welcome">
      <p>你好！我是记账助手</p>
      <p>输入商品和数量，我帮你开单</p>
      <p>例如：水泥20 黄沙15</p>
    </div>
  <div id="chat-bottom-anchor"></div>
  </div>
  <div class="chat-input-area" id="chat-input-area">
    <button class="open-btn" onclick="openCashier()">开单</button>
    <textarea id="chat-input" placeholder="输入商品信息…" rows="1"></textarea>
    <button class="send-btn" id="chat-send-btn">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="chat-nav-spacer"></div>
</div>

<!-- ========== 收银台 ========== -->
<div id="page-cashier" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1>收银台</h1>
    <button class="header-btn" id="cashier-delivery-btn" style="display:none;" onclick="showDeliveryNote(cashierEditingOrderId)">配送单</button>
  </div>
  <div class="page-body">
    <div class="form-section">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <label class="form-label">客户 <span class="required">*必选</span></label>
        <button class="btn-small" onclick="showAddCustomerFromCashier()">+新增</button>
      </div>
      <select class="form-select" id="cashier-customer" onchange="loadCashierAddresses(this.value)">
        <option value="">请选择客户</option>
      </select>
    </div>
    <div class="form-section">
      <label class="form-label">送货地址</label>
      <div id="cashier-address-history" class="address-tags"></div>
      <input type="text" class="form-input" id="cashier-address" placeholder="输入新地址（可选）">
    </div>
    <div class="form-section">
      <label class="form-label">开单日期</label>
      <input type="date" class="form-input" id="cashier-order-date">
    </div>
    <div class="form-section">
      <label class="form-label">商品明细</label>
      <div id="cashier-items"></div>
      <button class="btn-add-item" onclick="addCashierItem()">+ 添加商品</button>
    </div>
    <div class="form-section">
      <label class="form-label">订单状态</label>
      <div class="status-row">
        <span class="status-text-left">未结清</span>
        <label class="switch">
          <input type="checkbox" id="cashier-settled" onchange="onSettledChange(this)">
          <span class="slider"></span>
        </label>
        <span class="status-text-right">已结清</span>
      </div>
    </div>
    <div class="form-section" id="cashier-paid-section">
      <label class="form-label">已付金额</label>
      <input type="number" class="form-input" id="cashier-paid-amount" value="0">
    </div>
    <div class="total-bar">
      <span class="total-label">总金额</span>
      <span class="total-amount" id="cashier-total">¥0.00</span>
    </div>
    <div class="action-buttons">
      <button class="btn-secondary" onclick="goBack()">返回</button>
      <button class="btn-primary" onclick="saveOrder()">保存订单</button>
    </div>
  </div>
</div>
<!-- ========== 订单详情（只读） ========== -->
<div id="page-order-detail" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1>订单详情</h1>
    <button class="header-btn" id="order-detail-edit-btn">编辑</button>
  </div>
  <div class="page-body" id="order-detail-content"></div>
</div>
<!-- ========== 客户列表 ========== -->
<div id="page-customers" class="page">
  <div class="page-header">
    <h1>客户管理</h1>
    <button class="header-btn" onclick="showAddCustomer()">+</button>
  </div>
  <div class="page-body">
    <div class="search-bar">
      <input type="text" id="customer-search" placeholder="搜索客户姓名或电话" oninput="searchCustomers()">
    </div>
    <div id="customer-list" class="list-container"></div>
  </div>
</div>

<!-- ========== 客户详情 ========== -->
<div id="page-customer-detail" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1 id="detail-customer-name">客户详情</h1>
    <button class="header-btn" id="edit-customer-btn" onclick="editCurrentCustomer()">编辑</button>
  </div>
  <div class="page-body" id="customer-detail-content"></div>
</div>

<!-- ========== 报表 ========== -->
<div id="page-reports" class="page">
  <div class="page-header">
    <h1>报表统计</h1>
    <button class="header-btn" style="visibility:hidden;">.</button>
  </div>
  <div class="page-body">
    <div class="report-tabs">
      <button class="tab-btn active" onclick="switchReportTab(this,'time')">按时间查账</button>
      <button class="tab-btn" onclick="switchReportTab(this,'customer')">按客户查账</button>
    </div>
    <div class="report-filter">
      <div style="display:flex;align-items:center;gap:10px;">
        <select id="report-time-range" class="form-select" onchange="loadReport()" style="flex:1;">
          <option value="today" selected>今天</option>
          <option value="month">本月</option>
          <option value="custom">自定义</option>
        </select>
        <span id="report-date-label" style="font-size:12px;color:#8A9BB0;white-space:nowrap;flex-shrink:0;"></span>
      </div>
      <div id="report-custom-dates" class="custom-dates" style="display:none;">
        <input type="date" id="report-date-start" class="form-input">
        <span>至</span>
        <input type="date" id="report-date-end" class="form-input">
        <button class="btn-small" onclick="loadReport()">查询</button>
      </div>
    </div>
    <div id="report-search-box" class="report-search" style="display:none;">
      <input type="text" id="report-customer-search" placeholder="搜索客户名称" oninput="filterReportCustomer()">
    </div>
    <div id="report-summary" class="report-summary"></div>
    <div id="report-content" class="list-container"></div>
    <div class="report-export">
      <button class="btn-secondary" onclick="exportExcel()">导出Excel</button>
    </div>
  </div>
</div>

<!-- ========== 系统管理 ========== -->
<div id="page-settings" class="page">
  <div class="page-header">
    <h1>系统管理</h1>
    <button class="header-btn" style="visibility:hidden;">.</button>
  </div>
  <div class="page-body">
    <div class="settings-menu">
      <div class="menu-item" onclick="showPage('page-products')"><span class="menu-text">产品管理</span><span class="menu-arrow">‣</span></div>
      <div class="menu-item" onclick="showPage('page-delivery-settings')"><span class="menu-text">配送单设置</span><span class="menu-arrow">‣</span></div>
      <div class="menu-item" onclick="showPage('page-password')"><span class="menu-text">密码设置</span><span class="menu-arrow">‣</span></div>
      <div class="menu-item" onclick="exportExcel()"><span class="menu-text">导出Excel</span><span class="menu-arrow">‣</span></div>
      <div class="menu-item" onclick="backupData()"><span class="menu-text">备份数据</span><span class="menu-arrow">‣</span></div>
      <div class="menu-item" onclick="restoreData()"><span class="menu-text">恢复数据</span><span class="menu-arrow">‣</span></div>
      <div class="menu-item" onclick="clearAllData()"><span class="menu-text" style="color:#e53935;">清空所有数据</span><span class="menu-arrow">‣</span></div>
    </div>
  </div>
</div>

<!-- ========== 产品管理 ========== -->
<div id="page-products" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1>产品管理</h1>
    <button class="header-btn" onclick="showAddProduct()">+</button>
  </div>
  <div class="page-body">
    <div id="product-list" class="list-container"></div>
  </div>
</div>

<!-- ========== 配送单设置（N19） ========== -->
<div id="page-delivery-settings" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1>配送单设置</h1>
    <button class="header-btn" onclick="saveDeliverySettings()">保存</button>
  </div>
  <div class="page-body">
    <div class="form-section">
      <label class="form-label">配送单标题</label>
      <input type="text" class="form-input" id="delivery-set-title" placeholder="例如：XX沙场 配送单">
    </div>
    <div class="form-section">
      <label class="form-label">订货电话</label>
      <input type="tel" class="form-input" id="delivery-set-phone" placeholder="输入订货电话">
    </div>
    <div class="form-section">
      <label class="form-label">银行账号</label>
      <input type="text" class="form-input" id="delivery-set-bank" placeholder="输入银行账号信息">
    </div>
    <div class="form-section">
      <label class="form-label">其他信息</label>
      <input type="text" class="form-input" id="delivery-set-extra" placeholder="其他需要显示在配送单底部的信息">
    </div>
  </div>
</div>

<!-- ========== 密码设置 ========== -->
<div id="page-password" class="page">
  <div class="page-header">
    <button class="back-btn" onclick="goBack()">← 返回</button>
    <h1>密码设置</h1>
    <button class="header-btn" style="visibility:hidden;">.</button>
  </div>
  <div class="page-body">
    <div class="settings-menu">
      <div class="menu-item" onclick="showChangePassword()">
        <span class="menu-text">修改密码</span>
        <span class="menu-arrow">‣</span>
      </div>
    </div>
  </div>
</div>

<!-- ========== 弹窗 ========== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <span id="modal-title">提示</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- 提示消息 -->
<div class="toast" id="toast"></div>

<!-- ========== 底部导航 ========== -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('home')">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <span class="nav-text">首页</span>
  </div>
  <div class="nav-item" onclick="switchTab('chat')">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    <span class="nav-text">记账</span>
  </div>
  <div class="nav-item" onclick="switchTab('customers')">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>

    <span class="nav-text">客户</span>

  <div class="nav-item" onclick="switchTab('reports')">

      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </div>

    </div>
    <span class="nav-text">管理</span>
  </div>
</div>

<!-- ========== 核心脚本 ========== -->
<script>
var currentPage = 'page-home';
var pageHistory = [];
var db = null;

function switchTab(tabName) {
  var map = {home:'page-home',chat:'page-chat',customers:'page-customers',reports:'page-reports',settings:'page-settings'};
  var pageId = map[tabName];
  if (!pageId) return;
  pageHistory = [];
  showPage(pageId);
  var navItems = document.querySelectorAll('.nav-item');
  var tabs = ['home','chat','customers','reports','settings'];
  for (var i = 0; i < navItems.length; i++) {
    navItems[i].classList.remove('active');
    if (tabs[i] === tabName) navItems[i].classList.add('active');
  }
  if (tabName === 'home' && typeof loadHomePage === 'function') loadHomePage();
  if (tabName === 'customers' && typeof loadCustomerList === 'function') loadCustomerList();
  if (tabName === 'reports' && typeof loadReport === 'function') loadReport();
}

function showPage(pageId) {
  pageHistory.push(currentPage);
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById(pageId).classList.add('active');
  currentPage = pageId;
}

function goBack() {
  if (pageHistory.length === 0) { switchTab('home'); return; }
  var prev = pageHistory.pop();
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  document.getElementById(prev).classList.add('active');
  currentPage = prev;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function showModal(title, bodyHTML, footerHTML) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML || '';
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function showConfirm(title, msg, callback) {
  showModal(title, '<div class="confirm-message">' + msg + '</div>',
    '<button class="btn-secondary" onclick="closeModal()">取消</button>' +
    '<button class="btn-primary" id="confirm-ok-btn">确定</button>');
  setTimeout(function() {
    var btn = document.getElementById('confirm-ok-btn');
    if (btn) btn.onclick = function() { closeModal(); if (callback) callback(); };
  }, 50);
}

function onSettledChange(el) {
  document.getElementById('cashier-paid-section').style.display = el.checked ? 'none' : 'block';
}

function loadHomePage() {}

function switchReportTab(btn, type) {
  var btns = document.querySelectorAll('.report-tabs .tab-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  var searchBox = document.getElementById('report-search-box');
  if (searchBox) searchBox.style.display = (type === 'customer') ? 'block' : 'none';
  try { if (typeof loadReport === 'function') loadReport(type); } catch(e) {}
}

window.onload = function() {
  if (typeof initDB === 'function') initDB(function() {
    if (typeof loadHomePage === 'function') loadHomePage();
    if (typeof checkAuth === 'function') checkAuth();
  });
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
};
</script>
